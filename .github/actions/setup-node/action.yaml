name: setup-node
description: Set up Node.js environment for GitHub Actions. Makes sure the right version of npm is installed.

runs:
  using: 'composite'
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm

    - name: Check npm version
      run: |
        npm -v
        node -v
      shell: bash

    - name: Setup npm version
      # Note: Due to a bug, it is necessary to do a double install.
      # https://github.com/npm/cli/issues/9151
      run: |
        npm install -g npm@11.11.1
        npm install -g npm@11
      shell: bash

    - name: Check npm version
      run: |
        npm -v
        node -v
      shell: bash
